# Spring profile: integration
# Activated by: mvn test -P integration-test
#
# Uses CPT's "managed" runtime: embedded Zeebe + full connector runtime in Docker.
# Real connectors run (HTTP JSON, agenticai) — no mocks needed for connector tests.
#
# Run with Bedrock secrets loaded:
#   env $(cat ../.env | grep -v '^#' | xargs) mvn test -P integration-test

camunda:
  process-test:
    runtime-mode: managed
    connectors-enabled: true
    # Connector secrets: map env vars to BPMN {{secrets.*}} references
    # These must match the secret names used in the BPMN: {{secrets.AWS_BEDROCK_ACCESS_KEY}}
    # Note: use relaxed binding form (aws.bedrock.access.key) instead of ${AWS_BEDROCK_ACCESS_KEY}
    # to avoid Spring Boot 4's circular placeholder detection when YAML key name == placeholder name.
    connectors-secrets:
      AWS_BEDROCK_ACCESS_KEY: ${aws.bedrock.access.key}
      AWS_BEDROCK_SECRET_KEY: ${aws.bedrock.secret.key}

logging:
  level:
    root: warn
    io.camunda.process.test: info
    io.camunda.tests: info
    org.testcontainers: warn
    tc: error
